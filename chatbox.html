<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>
  <style>
    body {
      font-family: arial;
      margin: 0;
    }

    .send-button {
      background-color: rgb(25, 135, 84);
      color: white;
      padding: 12px 20px;
      margin-left: 10px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    .chat-input {
      padding: 12px 15px;
      border-radius: 10px;
      border-width: 1px;
      font-size: 15px;
      flex-grow: 1;
    }

    .chat-input-container {
      display: flex;
      margin-bottom: 60px;
    }

    .app-container {
      max-width: 600px;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chat-message-user {
      display: flex;
      justify-content: end;
      align-items: start;
    }

    .chat-message-robot {
      display: flex;
      align-items: start;
    }

    .chat-message-text {
      background-color: rgb(238, 238, 238);
      padding: 15px 20px;
      border-radius: 10px;
      margin: 10px;
      max-width: 300px;
    }

    .chat-message-profile {
      width: 45px;
    }

    .chat-messages-container {
      flex-grow: 1;
      margin-top: 20px;
      overflow-y: scroll;
      scrollbar-width: none;
    }

    .welcome-message {
      color: rgb(120, 120, 120);
      text-align: center;
    }

    .loading-spinner {
      height: 40px;
      margin: -15px;
    }
  </style>
</head>

<body>
  <div class="js-container"></div>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>

  <script type="text/babel">

    function ChatInput({ chatMessages, setChatMessages }) {
      const [inputText, setInputText] = React.useState('');

      function saveInputText(e) {
        setInputText(e.target.value);
      }

      async function sendMessage() {
        if (!inputText.trim()) return;

        const userMessage = {
          message: inputText,
          sender: "user",
          id: crypto.randomUUID()
        };

        setInputText('');

        const newMessages = [...chatMessages, userMessage];

        // Show loading spinner
        setChatMessages([
          ...newMessages,
          {
            message: <img src="loading-spinner.gif" className="loading-spinner" />,
            sender: "robot",
            id: "loading"
          }
        ]);

        const response = await chatbot.getResponseAsync(inputText);

        // Replace loading with real response
        setChatMessages([
          ...newMessages,
          {
            message: response,
            sender: "robot",
            id: crypto.randomUUID()
          }
        ]);
      }

      function handleKeyDown(e) {
        if (e.key === 'Enter') sendMessage();
        if (e.key === 'Escape') setInputText('');
      }

      return (
        <div className="chat-input-container">
          <input
            className="chat-input"
            placeholder="Send a message to Chatbot"
            value={inputText}
            onChange={saveInputText}
            onKeyDown={handleKeyDown}
          />
          <button className="send-button" onClick={sendMessage}>
            Send
          </button>
        </div>
      );
    }

    function ChatMessage({ message, sender }) {
      return (
        <div className={sender === 'user' ? 'chat-message-user' : 'chat-message-robot'}>
          {sender === 'robot' && (
            <img src="robot.png" className="chat-message-profile" />
          )}

          <div className="chat-message-text">
            {message}
          </div>

          {sender === 'user' && (
            <img src="user.png" className="chat-message-profile" />
          )}
        </div>
      );
    }

    function useAutoScroll(dependencies) {
      const ref = React.useRef(null);

      React.useEffect(() => {
        if (ref.current) {
          ref.current.scrollTop = ref.current.scrollHeight;
        }
      }, dependencies);

      return ref;
    }

    function ChatMessages({ chatMessages }) {
      const ref = useAutoScroll([chatMessages]);

      return (
        <div className="chat-messages-container" ref={ref}>
          {chatMessages.map(msg => (
            <ChatMessage
              key={msg.id}
              message={msg.message}
              sender={msg.sender}
            />
          ))}
        </div>
      );
    }

    function App() {
      const [chatMessages, setChatMessages] = React.useState([]);

      return (
        <div className="app-container">
          {chatMessages.length === 0 && (
            <p className="welcome-message">
              Welcome to the chatbot project! Send a message below.
            </p>
          )}

          <ChatMessages chatMessages={chatMessages} />

          <ChatInput
            chatMessages={chatMessages}
            setChatMessages={setChatMessages}
          />
        </div>
      );
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);

  </script>
</body>
</html>
