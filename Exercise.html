<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
      .js-click,.js-auto,.js-reset{
        background-color: rgb(25,135,84);
        color: white;
        border: none;
        padding: 20px 30px;
        margin-left: 15px;
        border-radius: 10px;
        font-size:20px;

      }
      .js-container{
        display: flex;
        justify-content: center;
        height: 100vh;
        background-color: rgb(222,222,222);
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
    
      function App(){
       const [count, setCount] = React.useState(0);
       const [isAutoOn,setAutoOn] = React.useState(false)
       const autoButton = React.useRef(null)
       function autoClick(){
        const intervalId = setInterval(()=>{
          const buttonElem = autoButton.current;
          if(buttonElem){
            buttonElem.click()
          }
          return () => clearInterval(intervalId)
        },1000
        )
       }
        return(
        <>  
        <button ref={autoButton} onClick={()=>{setCount( count + 1)}} className="js-click">Click {count} times</button>
        <button onClick={()=>{setCount(0)}}className="js-reset">Reset</button>
        <button onClick={autoClick} className="js-auto">Auto Click</button>
        </>
        )
      }
      
    
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
